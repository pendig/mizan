services:
  api:
    build:
      context: .
    environment:
      MIZAN_HTTP_ADDR: 0.0.0.0:18180
      DATABASE_URL: sqlite:///data/mizan.sqlite3
      REDIS_URL: redis://redis:6379/
      RUST_LOG: mizan=info,tower_http=info
    ports:
      - "18180:18180"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - mizan-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: mizan
      POSTGRES_USER: mizan
      POSTGRES_PASSWORD: mizan
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mizan -d mizan"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mizan-data:
  postgres-data:
